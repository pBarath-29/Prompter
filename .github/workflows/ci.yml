name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: placeholder
          ADMIN_EMAIL: admin@example.com
          FIREBASE_API_KEY: placeholder
          FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          FIREBASE_DATABASE_URL: https://placeholder-default-rtdb.firebaseio.com
          FIREBASE_PROJECT_ID: placeholder
          FIREBASE_STORAGE_BUCKET: placeholder.firebasestorage.app
          FIREBASE_MESSAGING_SENDER_ID: "123456789"
          FIREBASE_APP_ID: "1:123456789:web:abc123"
